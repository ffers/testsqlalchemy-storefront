name: Deploy Storefront

on:
  push:
    branches:
      - main # деплой при пуше в main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        name: Install pnpm
        with:
          version: 10
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm build
        env:
          NEXT_PUBLIC_SALEOR_API_URL: ${{ secrets.NEXT_PUBLIC_SALEOR_API_URL }}
          API_CHAT_KEY: ${{ secrets.API_CHAT_KEY }}
          NEXT_PUBLIC_API_CHAT_KEY: ${{ secrets.NEXT_PUBLIC_API_CHAT_KEY }}
          NEXT_PUBLIC_NAME: ${{ vars.NEXT_PUBLIC_NAME }}
          NEXT_PUBLIC_DESCRIPTION: ${{ vars.NEXT_PUBLIC_DESCRIPTION }}
          NEXT_PUBLIC_DOMEN: ${{ secrets.NEXT_PUBLIC_DOMEN }}
          ASXCRM_APP_TOKEN: ${{ secrets.ASXCRM_APP_TOKEN }}
          NEXT_PUBLIC_DEFAULT_CHANNEL: ${{ vars.NEXT_PUBLIC_DEFAULT_CHANNEL }}
          NEXT_PUBLIC_SALEOR_CHANNEL_SLUG: ${{ vars.NEXT_PUBLIC_SALEOR_CHANNEL_SLUG }}
          NEXT_PUBLIC_CONTACT_EMAIL: ${{ vars.NEXT_PUBLIC_CONTACT_EMAIL }}
          NEXT_PUBLIC_CONTACT_INSTAGRAM: ${{ vars.NEXT_PUBLIC_CONTACT_INSTAGRAM }}
          NEXT_PUBLIC_CONTACT_PHONE: ${{ vars.NEXT_PUBLIC_CONTACT_PHONE }}
          NEXT_PUBLIC_CONTACT_TELEGRAM: ${{ vars.NEXT_PUBLIC_CONTACT_TELEGRAM }}
          NEXT_PUBLIC_CONTACT_VIBER: ${{ vars.NEXT_PUBLIC_CONTACT_VIBER }}
          NEXT_PUBLIC_DEFAULT_LOCALE: ${{ vars.NEXT_PUBLIC_DEFAULT_LOCALE }}
      - name: Clean remote .next folder
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            rm -rf /home/fferses/storefront/.next

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: ".next/*,public/*,package.json,pnpm-lock.yaml"
          target: "/home/fferses/storefront"
